{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="page-wrap-sm">
  <div class="auth-card fade-up">

    <div class="auth-logo">
      <img src="{{ url_for('static', filename='logo-light.png') }}" class="brand-logo brand-logo-light" alt="CryptoSign" height="52">
      <img src="{{ url_for('static', filename='logo-dark.png') }}" class="brand-logo brand-logo-dark" alt="CryptoSign" height="52">
    </div>
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:1.125rem;font-weight:700;color:var(--text);letter-spacing:-0.01em;">CryptoSign</div>
    </div>

    <div class="auth-title">Set new password</div>
    <div class="auth-subtitle">Choose a strong password for your account.</div>

    <form method="POST" action="{{ url_for('reset_password') }}">
      <input type="hidden" name="username" value="{{ username }}">

      <div class="form-group">
        <label class="form-label" for="password">New Password</label>
        <input class="form-control" type="password" id="password" name="password"
               placeholder="Min. 8 characters" required minlength="8" autofocus>
        <div class="pw-strength mt-1"><div class="pw-strength-bar"></div></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm New Password</label>
        <input class="form-control" type="password" id="confirm_password" name="confirm_password"
               placeholder="Repeat password" required>
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Reset Password
      </button>
    </form>

  </div>
</div>
{% endblock %}
