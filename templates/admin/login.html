<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — CryptoSign</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</head>
<body>
<nav class="navbar">
  <a href="{{ url_for('login') }}" class="navbar-brand">
    <img src="{{ url_for('static', filename='logo-light.png') }}" class="brand-logo brand-logo-light" alt="CryptoSign" height="32">
    <img src="{{ url_for('static', filename='logo-dark.png') }}" class="brand-logo brand-logo-dark" alt="CryptoSign" height="32">
    CryptoSign
  </a>
  <div class="nav-right" style="margin-left:auto">
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">
      <svg id="theme-icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="theme-icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</nav>

<div id="flash-container" style="position:fixed;top:72px;right:20px;z-index:200;width:320px;display:flex;flex-direction:column;gap:8px;">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ 'danger' if cat in ['danger','error'] else cat }}" data-auto-dismiss style="margin:0;box-shadow:var(--shadow)">
      <span>{{ msg }}</span>
    </div>
    {% endfor %}
  {% endwith %}
</div>

<div class="page-wrap-sm" style="padding-top:72px">
  <div class="auth-card fade-up">
    <div class="auth-logo">
      <img src="{{ url_for('static', filename='logo-light.png') }}" class="brand-logo brand-logo-light" alt="CryptoSign" height="40">
      <img src="{{ url_for('static', filename='logo-dark.png') }}" class="brand-logo brand-logo-dark" alt="CryptoSign" height="40">
      CryptoSign
    </div>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div style="width:36px;height:36px;border-radius:10px;background:rgba(var(--danger-rgb),.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div>
        <div class="auth-title" style="margin-bottom:0">Admin Portal</div>
        <div class="auth-subtitle" style="margin-bottom:0">Restricted access — authorised personnel only</div>
      </div>
    </div>

    <hr class="divider">

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-danger btn-full btn-lg" style="margin-top:8px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Sign In to Admin Panel
      </button>
    </form>

    <hr class="divider">
    <p style="text-align:center;font-size:13px;color:var(--text3)">
      Regular user? <a href="{{ url_for('login') }}">Sign in here</a>
    </p>
  </div>
</div>

<script>
(function() {
  const theme = localStorage.getItem('cs-theme') || 'light';
  if (theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    const moon = document.getElementById('theme-icon-moon');
    const sun  = document.getElementById('theme-icon-sun');
    if (moon) moon.style.display = 'none';
    if (sun)  sun.style.display  = 'block';
  }
})();
</script>
</body>
</html>
