{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="page-wrap-sm">
  <div class="auth-card fade-up">

    <div class="auth-logo">
      <img src="{{ url_for('static', filename='logo-light.png') }}" class="brand-logo brand-logo-light" alt="CryptoSign" height="52">
      <img src="{{ url_for('static', filename='logo-dark.png') }}" class="brand-logo brand-logo-dark" alt="CryptoSign" height="52">
    </div>
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:1.125rem;font-weight:700;color:var(--text);letter-spacing:-0.01em;">CryptoSign</div>
    </div>

    <div class="auth-title">Welcome back</div>
    <div class="auth-subtitle">Sign in to manage your keys, sign files, and verify signatures.</div>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" type="text" id="username" name="username"
               value="{{ request.form.get('username', '') }}"
               placeholder="Your username" autocomplete="username" required autofocus>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">
          Password
          <a href="{{ url_for('forgot_password') }}" style="float:right;font-size:12px;font-weight:400">Forgot password?</a>
        </label>
        <input class="form-control" type="password" id="password" name="password"
               placeholder="Your password" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
        Sign In
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:13.5px;color:var(--text3)">
      No account yet? <a href="{{ url_for('register') }}">Create one</a>
    </div>

  </div>
</div>
{% endblock %}
